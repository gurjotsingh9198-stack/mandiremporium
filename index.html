const CLOUD_OK = CONFIG.JSONBIN_BIN_ID !== "YOUR_BIN_ID_HERE";
const CDN_OK   = CONFIG.CLOUDINARY_CLOUD_NAME !== "YOUR_CLOUD_NAME_HERE";

async function cloudLoad() {
  if (!CLOUD_OK) return null;
  try {
    const r = await fetch(
      `https://api.jsonbin.io/v3/b/${CONFIG.JSONBIN_BIN_ID}/latest`,
      { headers: { "X-Master-Key": CONFIG.JSONBIN_API_KEY } }
    );
    if (!r.ok) return null;
    const d = await r.json();
    return d.record && d.record.brandName ? d.record : null;
  } catch { return null; }
}

async function cloudSave(data) {
  if (!CLOUD_OK) throw new Error("not configured");
  const r = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.JSONBIN_BIN_ID}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": CONFIG.JSONBIN_API_KEY },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error("save failed");
}

async function cdnUpload(file) {
  if (!CDN_OK) throw new Error("cloudinary not configured");
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", CONFIG.CLOUDINARY_UPLOAD_PRESET);
  const r = await fetch(
    `https://api.cloudinary.com/v1_1/${CONFIG.CLOUDINARY_CLOUD_NAME}/image/upload`,
    { method: "POST", body: fd }
  );
  if (!r.ok) throw new Error("upload failed");
  const d = await r.json();
  return d.secure_url;
}

.spf textarea{height:75px;resize:vertical;line-height:1.5}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);color:#fff;padding:.65rem 1.4rem;font-size:.72rem;z-index:5000;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.2);pointer-events:none;white-space:nowrap;animation:fadeInUp .3s ease}

.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

@keyframes fadeInUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-7px)}}

  .pj-sp{grid-template-columns:1fr}.pj-img{min-height:220px}.pj-fs{grid-template-columns:1fr;gap:.6rem}

  .fb{width:46px;height:46px}.adm-panel{width:100vw}
  .mv-g{grid-template-columns:1fr;margin-top:2rem}.story-g{margin-top:2.5rem}
}

// ── IMAGE UPLOAD ───────────────────────────────────────────────
function ImgUp({value,onUrl,label,hint,isLogo=false}) {
  const [busy,setBusy] = useState(false);
  const [err,setErr]   = useState("");

  const handle = async (e) => {
    const file = e.target.files[0]; if(!file) return;
    setErr("");
    if (!CDN_OK) {
      // Fallback: base64 (local only)
      setErr("⚠️ Cloudinary not set up yet — this image won't show on other devices.");
      const r = new FileReader();
      r.onload = ev => onUrl(ev.target.result);
      r.readAsDataURL(file);
      e.target.value = ""; return;
    }
    setBusy(true);
    try { onUrl(await cdnUpload(file)); }
    catch { setErr("Upload failed. Check your Cloudinary settings."); }
    finally { setBusy(false); e.target.value = ""; }
  };

  return (
    <div className="spf">
      {label && <label>{label}</label>}
      {value ? (
        <div className={"up-prev"+(isLogo?" logo-prev":"")}>
          <img src={value} alt="preview"/>
          <div className="up-acts">
            <label className="up-btn" title="Replace" style={{cursor:"pointer"}}>↑<input type="file" accept="image/*" onChange={handle} style={{display:"none"}}/></label>
            <button className="up-btn" onClick={()=>onUrl("")}>✕</button>
          </div>
        </div>
      ) : (
        <div className="up-area">
          <input type="file" accept="image/*" onChange={handle} disabled={busy}/>
          {busy
            ? <div className="up-ing"><span className="spin spin-d"></span> Uploading to Cloudinary…</div>
            : <><div className="up-t">☁️ {CDN_OK?"Upload Image":"Upload (set up Cloudinary first)"}</div><div className="up-s">{CDN_OK?"Uploaded to Cloudinary — visible on ALL devices":"Without Cloudinary, images only show on this device"}</div></>
          }
        </div>
      )}
      <input
        value={value && !value.startsWith("data:") ? value : ""}
        onChange={e=>onUrl(e.target.value)}
        placeholder="Or paste an image URL here"
        style={{marginTop:".45rem",borderRadius:6,border:"1px solid #c9cccf",padding:".45rem .7rem",fontSize:".75rem",width:"100%",outline:"none",fontFamily:"inherit"}}
      />
      {err && <div style={{fontSize:".62rem",color:"#dc2626",marginTop:".25rem"}}>{err}</div>}
      {hint && <div className="spf-h">{hint}</div>}
    </div>
  );
}

                    <div className="setup" style={{marginBottom:0}}>
                      <strong>⚙️ Setup Required for Cloud Images</strong>
                      Fill in your Cloudinary Cloud Name and Upload Preset in the CONFIG section. Until then, images only show on this device.
                    </div>
                  )}
                  {CLOUD_OK && CDN_OK && (
                    <div style={{fontSize:".7rem",color:"#008060",fontWeight:600,display:"flex",alignItems:"center",gap:".4rem"}}>
                      ✓ Cloud sync active — changes will be live on all devices after saving.
                    </div>
                  )}
                </div>
                <div className="adm-list">
                  {SECTIONS.map((s,idx)=>
                    s.group ? (
                      <div key={idx} className="adm-grp">{s.group}</div>
                    ) : (
                      <div key={s.key} className="adm-row" onClick={()=>setAdmTab(s.key)}>
                        <div className="adm-row-l">
                          <div className="adm-ic">
                            <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5">
                              {s.key==="brand"       &&<><rect x="2" y="4" width="16" height="12" rx="1"/><path d="M2 8h16M6 12h4"/></>}
                              {s.key==="favicon"     &&<><rect x="3" y="3" width="14" height="14" rx="2"/><path d="M7 10h6M10 7v6"/></>}
                              {s.key==="footer"      &&<><rect x="2" y="12" width="16" height="6" rx="1"/><path d="M2 8h16M2 4h10"/></>}
                              {s.key==="homepage"    &&<><path d="M3 9.5L10 3l7 6.5V18a1 1 0 01-1 1H4a1 1 0 01-1-1z"/><path d="M8 18v-6h4v6"/></>}
                              {s.key==="about"       &&<><circle cx="10" cy="6" r="3"/><path d="M4 18c0-3.31 2.69-6 6-6s6 2.69 6 6"/></>}
                              {s.key==="collections" &&<><path d="M3 3h14l-1.5 9H4.5L3 3z"/><circle cx="8" cy="17" r="1"/><circle cx="14" cy="17" r="1"/></>}
                              {s.key==="projects"    &&<><rect x="2" y="2" width="7" height="7" rx="1"/><rect x="11" y="2" width="7" height="7" rx="1"/><rect x="2" y="11" width="7" height="7" rx="1"/><rect x="11" y="11" width="7" height="7" rx="1"/></>}
                              {s.key==="pooja"       &&<><path d="M10 2L4 8v10h12V8L10 2z"/><path d="M8 18v-5h4v5"/></>}
                              {s.key==="contact"     &&<><path d="M2 4h16v12H2z"/><path d="M2 6l8 5 8-5"/></>}
                              {s.key==="why"         &&<><path d="M9 12l2 2 4-4M7 19H4a2 2 0 01-2-2V5a2 2 0 012-2h9l5 5v5"/></>}
                            </svg>
                          </div>
                          <div><div className="adm-rn">{s.name}</div><div className="adm-rd">{s.desc}</div></div>
                        </div>
                        <ChR/>
                      </div>
                    )
                  )}
                </div>
              </>
            ) : (
              <>
                <div className="adm-bc">
                  <button className="adm-bc-btn" onClick={()=>setAdmTab(null)}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M15 18l-6-6 6-6"/></svg>
                    &nbsp;Back
                  </button>
                  <span className="adm-bc-sep">›</span>
                  <span className="adm-bc-cur">{SECTIONS.find(s=>s.key===admTab)?.name||admTab}</span>
                </div>
                <div className="adm-ed"><AdminEditor/></div>
              </>
            )}
          </div>
          <div className="adm-dismiss" onClick={()=>{setAdmOpen(false);setAdmTab(null);}}/>
        </div>
      )}

      {/* TOAST NOTIFICATION */}
      {toast && (
        <div className={"toast "+(toast.type==="ok"?"toast-ok":"toast-er")}>{toast.msg}</div>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
